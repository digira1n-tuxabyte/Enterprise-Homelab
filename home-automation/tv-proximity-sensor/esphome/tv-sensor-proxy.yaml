esphome:
  name: tv-sensor-proxy
  friendly_name: TV Sensor Proxy

esp32:
  board: m5stack-atom
  framework:
    type: arduino

logger:
  
# VERPLICHT voor Bluetooth Proxy:
api:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  
# Voor updates op afstand:
ota:
  - platform: esphome

# Bluetooth Proxy instellingen
esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

# Radar Sensor (LD2410C) instellingen
uart:
  id: uart_bus
  tx_pin: 26  # Gele draad op Atom -> RX op sensor
  rx_pin: 32  # Witte draad op Atom -> TX op sensor
  baud_rate: 256000

ld2410:

# De sensoren voor in Home Assistant
sensor:
  - platform: ld2410
    moving_distance:
      name: "Bewegende afstand"
      filters:
        # Dit neemt het gemiddelde van de laatste 5 metingen.
        # Hierdoor springt de waarde veel minder snel op en neer.
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    still_distance:
      name: "Stilstaande afstand"
    detection_distance:
      name: "Gedetecteerde afstand"

binary_sensor:
  - platform: ld2410
    has_target:
      name: "Iemand aanwezig"